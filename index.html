<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramer Schildert</title>
  <link rel="stylesheet" href="https://use.typekit.net/yzq1qhq.css">
  <!--
    ADOBE FONTS — New Spirit
    1. Go to fonts.adobe.com and add "New Spirit" to a web project
    2. Copy your kit ID and replace YOUR_KIT_ID below
       e.g. https://use.typekit.net/abc1234.css
    3. Make sure your domain is listed under the kit's allowed domains
  -->
  <link rel="stylesheet" href="https://use.typekit.net/YOUR_KIT_ID.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #9784b9;
      --fg: #f0ece6;
      --font: "new-spirit", Georgia, serif;
    }

    html, body {
      width: 100%;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--fg);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: calc(100vw / 3);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .contact {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .contact a {
      color: var(--fg);
      text-decoration: none;
      font-family: var(--font);
      font-size: clamp(0.8rem, 1vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.14em;
      opacity: 0.75;
      transition: opacity 0.2s ease;
    }

    .contact a:hover {
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .logo-wrap {
      width: 100%;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .card {
        width: 100%;
        padding-left: 0.5em;
        padding-right: 0.5em;
      }
      .contact a {
        font-size: 0.95rem;
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main class="card">

    <div class="contact">
      <a href="tel:+32471470167">0471 47 01 67</a>
      <a href="mailto:fred@kramerschildert.be">mail<span class="sr-only">: fred@kramerschildert.be</span></a>
    </div>

    <div class="logo-wrap">
      <img src="kramerschildertblack.png" alt="Kramer Schildert" />
    </div>

  </main>

</body>
</html>
